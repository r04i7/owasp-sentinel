plugins {
    id 'java'
}

group = 'com.owaspsentinel'
version = '1.0.0'

repositories {
    mavenCentral()
}

dependencies {
    // Montoya API is provided by Burp at runtime, so compileOnly is correct.
    // Bump this to the latest published version if you run a newer Burp.
    compileOnly 'net.portswigger.burp.extensions:montoya-api:2023.12.1'
}

java {
    // Recent Burp builds ship a Java 17+ runtime.
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

// Produces build/libs/owasp-sentinel-1.0.0.jar
// No dependencies are bundled because montoya-api is provided by Burp.
jar {
    archiveBaseName = 'owasp-sentinel'
}
